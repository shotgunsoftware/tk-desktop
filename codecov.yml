coverage:
  status:
    # Disable patch coverage check - python/flowam/host.py contains code
    # that can only be executed inside the Desktop DCC, which is not available in CI
    patch:
      default:
        informational: true
    project:
      default:
        # Allow small coverage variations without failing the build
        threshold: 0.5%
        base: auto
        only_pulls: true
